# =====================================================================
# JURIFY — Staging Docker Compose
# =====================================================================
# Espelha produção na porta 3001 com variáveis de staging.
#
# Uso:
#   docker compose -f docker-compose.staging.yml up -d --build
#
# Pré-requisitos:
#   1. Copie .env.example → .env.staging e preencha os valores
#   2. Crie um projeto Supabase separado para staging (recomendado)
# =====================================================================

services:
  # ─── Jurify Frontend (Staging) ──────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile.production
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN}
        VITE_APP_VERSION: staging-${VITE_APP_VERSION:-latest}
        VITE_ENCRYPTION_KEY: ${VITE_ENCRYPTION_KEY}
    ports:
      - "3001:80"
    environment:
      - NODE_ENV=staging
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - jurify-staging

  # ─── Evolution API (WhatsApp) — Staging ─────────────────────────
  evolution-api:
    image: atendai/evolution-api:latest
    ports:
      - "8081:8080"
    environment:
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"
      SERVER_URL: https://evo-staging.${APP_DOMAIN:-localhost}
      SERVER_PORT: 8080
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: ${EVOLUTION_DATABASE_URL:-postgresql://postgres:postgres@db:5432/evolution_staging}
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_URL: ${VITE_SUPABASE_URL}/functions/v1/whatsapp-webhook
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "true"
      WEBHOOK_EVENTS: "MESSAGES_UPSERT,CONNECTION_UPDATE,QRCODE_UPDATED"
      LOG_LEVEL: "info"
      CHATWOOT_ENABLED: "false"
    volumes:
      - staging-evolution-instances:/evolution/instances
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - jurify-staging

volumes:
  staging-evolution-instances:

networks:
  jurify-staging:
    driver: bridge
