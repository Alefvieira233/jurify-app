name: 🚀 Deploy to Production

on:
  push:
    branches: [master, main]
    paths:
      - 'src/**'
      - 'supabase/**'
      - 'package.json'
  workflow_dispatch:  # Permite deploy manual

env:
  NODE_VERSION: '20'
  WORKING_DIR: '.'

jobs:
  # ==========================================
  # JOB 1: DEPLOY FRONTEND
  # ==========================================
  deploy-frontend:
    name: 🌐 Deploy Frontend to Production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: https://jurify.com.br

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: 📦 Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: 🧪 Run tests
        run: npm test -- --run
        env:
          CI: true

      - name: 🏗️ Build production
        run: npm run build
        env:
          NODE_ENV: production
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_APP_VERSION: ${{ github.sha }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_SALES_WHATSAPP: ${{ secrets.VITE_SALES_WHATSAPP }}
          # Sentry source map upload (opcional — build funciona sem estes)
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

      - name: 💾 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: dist
          retention-days: 7

      # Deploy para Vercel
      - name: 🚀 Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'

  # ==========================================
  # JOB 2: DEPLOY SUPABASE EDGE FUNCTIONS
  # ==========================================
  deploy-edge-functions:
    name: ⚡ Deploy Edge Functions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: 📦 Install Supabase CLI
        run: |
          curl -fsSL https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz | tar -xz
          sudo mv supabase /usr/local/bin/

      - name: 🔗 Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: ⚡ Deploy Edge Functions
        run: |
          echo "🚀 Deploying edge functions..."
          # Functions públicas (sem JWT): health-check, stripe-webhook, whatsapp-webhook, zapsign-webhook
          supabase functions deploy health-check --no-verify-jwt
          supabase functions deploy stripe-webhook --no-verify-jwt
          supabase functions deploy whatsapp-webhook --no-verify-jwt
          supabase functions deploy zapsign-webhook --no-verify-jwt
          # Functions que requerem JWT (deploy padrão — com auth)
          for fn in assistant chat-completion send-email create-checkout-session \
                    customer-portal evolution-manager generate-embedding \
                    ingest-document vector-search google-calendar \
                    create-drive-folder cleanup-agent-memory ai-agent-processor \
                    zapsign-integration; do
            supabase functions deploy "$fn" 2>/dev/null || echo "⚠️ $fn: não encontrada, pulando"
          done
          echo "✅ Edge functions deployed"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: 🔐 Set Edge Function secrets
        run: |
          echo "🔐 Setting secrets..."
          # Apenas secrets que estão configurados (ignora vazios)
          SECRETS=""
          [ -n "$OPENAI_API_KEY" ]          && SECRETS="$SECRETS OPENAI_API_KEY=$OPENAI_API_KEY"
          [ -n "$STRIPE_SECRET_KEY" ]        && SECRETS="$SECRETS STRIPE_SECRET_KEY=$STRIPE_SECRET_KEY"
          [ -n "$STRIPE_WEBHOOK_SECRET" ]    && SECRETS="$SECRETS STRIPE_WEBHOOK_SECRET=$STRIPE_WEBHOOK_SECRET"
          [ -n "$EVOLUTION_API_URL" ]        && SECRETS="$SECRETS EVOLUTION_API_URL=$EVOLUTION_API_URL"
          [ -n "$EVOLUTION_API_KEY" ]        && SECRETS="$SECRETS EVOLUTION_API_KEY=$EVOLUTION_API_KEY"
          [ -n "$ZAPSIGN_API_TOKEN" ]        && SECRETS="$SECRETS ZAPSIGN_API_TOKEN=$ZAPSIGN_API_TOKEN"
          [ -n "$GOOGLE_CLIENT_SECRET" ]     && SECRETS="$SECRETS GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET"
          [ -n "$SECRETS" ] && supabase secrets set $SECRETS --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} || echo "⚠️ No new secrets to set"
          echo "✅ Secrets configured"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          EVOLUTION_API_URL: ${{ secrets.EVOLUTION_API_URL }}
          EVOLUTION_API_KEY: ${{ secrets.EVOLUTION_API_KEY }}
          ZAPSIGN_API_TOKEN: ${{ secrets.ZAPSIGN_API_TOKEN }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}

  # ==========================================
  # JOB 3: RUN DATABASE MIGRATIONS
  # ==========================================
  deploy-migrations:
    name: 🗄️ Run Database Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: production

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Install Supabase CLI
        run: |
          curl -fsSL https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz | tar -xz
          sudo mv supabase /usr/local/bin/

      - name: 🔗 Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: 🗄️ Run migrations
        run: |
          echo "🗄️ Running pending migrations..."
          supabase db push || echo "⚠️ No new migrations"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # ==========================================
  # JOB 4: SMOKE TESTS
  # ==========================================
  smoke-tests:
    name: 💨 Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [deploy-frontend, deploy-edge-functions]
    environment:
      name: production

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 🔍 Health check - Frontend
        run: |
          echo "🔍 Checking frontend health..."
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://jurify.app || echo "000")
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
              echo "✅ Frontend OK (HTTP $STATUS)"
              exit 0
            fi
            echo "⚠️ Attempt $i: HTTP $STATUS — retrying in 10s..."
            sleep 10
          done
          echo "❌ Frontend health check failed after 3 attempts"
          exit 1

      - name: 🔍 Health check - Edge Functions
        run: |
          echo "🔍 Checking edge functions..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
            "${{ secrets.VITE_SUPABASE_URL }}/functions/v1/health-check" \
            -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}" || echo "000")
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
            echo "✅ Edge Functions OK (HTTP $STATUS)"
          else
            echo "❌ Edge Functions health check failed (HTTP $STATUS)"
            exit 1
          fi

      - name: 📊 Report deployment
        run: |
          echo "✅ Deploy completed!"
          echo "🌐 Frontend: https://jurify.app"
          echo "⚡ Edge Functions: Deployed"
          echo "🗄️ Migrations: Applied"

  # ==========================================
  # JOB 5: NOTIFICATION
  # ==========================================
  notify:
    name: 📢 Notify Team
    runs-on: ubuntu-latest
    needs: [smoke-tests]
    if: always()

    steps:
      - name: 📧 Send notification
        run: |
          echo "📢 Deploy notification:"
          echo "Status: ${{ needs.smoke-tests.result }}"
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"
          # Aqui você pode adicionar integração com Slack, Discord, etc.
