name: 🚀 CI Pipeline - Jurify

on:
  push:
    branches: [master, main, develop]
    paths:
      - 'src/**'
      - 'package.json'
      - 'tsconfig.json'
      - 'eslint.config.js'
      - 'vitest.config.ts'
      - '.github/workflows/**'
  pull_request:
    branches: [master, main, develop]

# Cancela runs anteriores se um novo push acontecer
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  WORKING_DIR: '.'

jobs:
  # ==========================================
  # JOB 1: LINT & TYPE CHECK
  # ==========================================
  lint-and-typecheck:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '${{ env.WORKING_DIR }}/package-lock.json'

      - name: 📦 Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: npm ci --prefer-offline --no-audit

      - name: 🔍 Run ESLint (0 errors, 0 warnings)
        working-directory: ${{ env.WORKING_DIR }}
        run: npx eslint . --max-warnings 0

      - name: 🔍 Run TypeScript type check
        working-directory: ${{ env.WORKING_DIR }}
        run: npm run type-check

  # ==========================================
  # JOB 2: UNIT TESTS
  # ==========================================
  test-unit:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint-and-typecheck

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '${{ env.WORKING_DIR }}/package-lock.json'

      - name: 📦 Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: npm ci --prefer-offline --no-audit

      - name: 🧪 Run unit tests
        working-directory: ${{ env.WORKING_DIR }}
        run: npm test -- --run --reporter=verbose
        env:
          CI: true
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: 📊 Generate coverage report
        working-directory: ${{ env.WORKING_DIR }}
        run: npm run test:coverage
        env:
          CI: true
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: 📤 Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: ${{ env.WORKING_DIR }}/coverage
          fail_ci_if_error: false
        continue-on-error: true

  # ==========================================
  # JOB 3: BUILD
  # ==========================================
  build:
    name: 🏗️ Build Application
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint-and-typecheck, test-unit]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '${{ env.WORKING_DIR }}/package-lock.json'

      - name: 📦 Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: npm ci --prefer-offline --no-audit

      - name: 🏗️ Build production bundle
        working-directory: ${{ env.WORKING_DIR }}
        run: npm run build
        env:
          NODE_ENV: production
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_APP_VERSION: ${{ github.sha }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

      - name: 📊 Enforce bundle size limits
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          echo "📦 Bundle size analysis:"
          TOTAL_JS_KB=$(find dist -type f -name "*.js" ! -name "*.map" -exec du -k {} + | awk '{s+=$1} END {print s}')
          echo "Total JS size: ${TOTAL_JS_KB}KB"
          if [ "$TOTAL_JS_KB" -gt 3072 ]; then
            echo "❌ FAIL: Total JS bundle exceeds 3MB limit (${TOTAL_JS_KB}KB)"
            exit 1
          fi
          echo "✅ Bundle size within limits"
          du -sh dist/ || true
          find dist -type f -name "*.js" ! -name "*.map" -exec du -h {} \; | sort -rh | head -10

      - name: 💾 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: ${{ env.WORKING_DIR }}/dist
          retention-days: 7

  # ==========================================
  # JOB 4: SECURITY SCAN
  # ==========================================
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better secret detection

      - name: 🔍 Detect secrets in code
        uses: trufflesecurity/trufflehog@v3.88.0
        with:
          path: ./
          extra_args: --only-verified --fail

      - name: 🛡️ Run npm audit
        working-directory: ${{ env.WORKING_DIR }}
        run: npm audit --audit-level=high

      - name: 📋 Check for exposed secrets in .env files
        run: |
          echo "🔍 Checking for .env files in git..."
          if git ls-files | grep -E '\.env$'; then
            echo "❌ ERROR: .env file found in git!"
            exit 1
          else
            echo "✅ No .env files in git"
          fi

  # ==========================================
  # JOB 5: E2E TESTS
  # ==========================================
  test-e2e:
    name: 🎭 E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '${{ env.WORKING_DIR }}/package-lock.json'

      - name: 📦 Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: npm ci --prefer-offline --no-audit

      - name: 🎭 Install Playwright browsers
        working-directory: ${{ env.WORKING_DIR }}
        run: npx playwright install --with-deps chromium

      - name: 🎭 Run E2E tests
        working-directory: ${{ env.WORKING_DIR }}
        run: npm run test:e2e -- --project=chromium
        env:
          CI: true
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}

      - name: 📤 Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ${{ env.WORKING_DIR }}/playwright-report
          retention-days: 7

  # ==========================================
  # JOB 6: DEPLOYMENT STATUS
  # ==========================================
  deployment-ready:
    name: ✅ Deployment Ready
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test-unit, build, security-scan, test-e2e]
    if: success()

    steps:
      - name: 🎉 All checks passed
        run: |
          echo "✅ CI Pipeline passou com sucesso!"
          echo "✅ Lint: OK"
          echo "✅ Type Check: OK"
          echo "✅ Unit Tests: OK"
          echo "✅ E2E Tests: OK"
          echo "✅ Build: OK"
          echo "✅ Security: OK"
          echo ""
          echo "🚀 Ready para deploy!"
