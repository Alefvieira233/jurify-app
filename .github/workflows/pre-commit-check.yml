name: 🔒 Pre-commit Security Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  security-check:
    name: 🔐 Detect Secrets & Security Issues
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 Scan for secrets
        uses: trufflesecurity/trufflehog@v3.88.0
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified

      - name: 🔍 Check for hardcoded credentials
        run: |
          echo "🔍 Scanning for potential secrets..."

          # Padrões perigosos (exclui diretórios de build/docs e extensões inofensivas)
          # Usa find para filtrar arquivos antes do grep para maior precisão
          SECRET_FILES=$(find . -type f \
            ! -path "*/node_modules/*" \
            ! -path "*/.git/*" \
            ! -path "*/dist/*" \
            ! -path "*/docs/*" \
            ! -path "*/scripts/*" \
            ! -path "*/supabase/migrations/*" \
            ! -name "*.example" \
            ! -name "*.sql" \
            ! -name "*.md")

          if [ -n "$SECRET_FILES" ]; then
            # Reduz sensibilidade para evitar falso positivos em chaves anon e env pointers
            # foca em sk- chaves OpenAI (48-51 chars) e tokens JWT grandes e suspeitos
            if echo "$SECRET_FILES" | xargs grep -lE "(sk-[a-zA-Z0-9]{48,51}|eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9\.[a-zA-Z0-9_-]{100,})" ; then
              echo "❌ API keys ou JWTs suspeitos encontrados no código!"
              exit 1
            fi
          fi

          # Check .env files
          if git diff --name-only ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }} | grep -E '\.env$'; then
            echo "❌ Arquivo .env sendo commitado!"
            exit 1
          fi

          echo "✅ No secrets detected"

      - name: 📋 Verify .env.example exists
        run: |
          if [ ! -f ".env.example" ]; then
            echo "⚠️ .env.example não encontrado"
          else
            echo "✅ .env.example existe"
          fi

      - name: 📝 Check commit messages
        run: |
          echo "📝 Verificando mensagens de commit..."
          git log --format=%B -n 1 ${{ github.event.pull_request.head.sha }} | \
            grep -iE "(fix|feat|chore|docs|refactor|test|perf)" || \
            echo "⚠️ Considere usar conventional commits (fix:, feat:, etc.)"
